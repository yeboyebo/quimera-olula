---
shortcuts: []
state: 
  generandoPedidoProv: false
bunch:
  onBotonGenerarPedidosProveedorClicked:
    # - _type: log 
    #   desc: mimensaje_onBotonGenerarPedidosProveedorClicked
    #   value:
    #     statePath: arrayMultiCheck
    - _type: set     
      path: generandoPedidoProv
      value:
        const: true
    - _type: patch
      action: generar_enviar_pedidoprov
      schema: pedidos
      data:
        - key: arrayPedidos
          value:
            statePath: arrayMultiCheck
      success: onGenerarPedidoProvSuccess
      error: onGenerarPedidoProvError  
  onGenerarPedidoProvSuccess:
    - _type: set     
      path: generandoPedidoProv
      value:
        const: false  
    - _type: alert
      text: Pedido Generado
      severity: success
  onGenerarPedidoProvError:
    - _type: set     
      path: generandoPedidoProv
      value:
        const: false