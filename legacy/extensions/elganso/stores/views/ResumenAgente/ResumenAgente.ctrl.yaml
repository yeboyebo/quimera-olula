# bunch: {}

shortcuts:
  - type: Model
state: { tiendas: {}, planificador: {}, tiendaSeleccionada: null, inicioSemana: null }
bunch:
  #OBTENER PLANIFICADOR
  onGetResumenByAgente:
    - _type: post
      schema: dias_planificados
      action: getResumenByAgente
      data:
        - key: showType
          value:
            payloadPath: showType
        - key: inicioSemana
          value:
            payloadPath: inicioSemana
        - key: inicioMes
          value:
            payloadPath: inicioMes
      success: onGetResumenByAgenteSuccess

  onGetResumenByAgenteSuccess:
    - _type: set
      path: planificador
      value:
        payloadPath: response.planificador
  #FIN OBTENER PLANIFICADOR
