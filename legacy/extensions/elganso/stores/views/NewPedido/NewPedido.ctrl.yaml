---
shortcuts:
bunch:
  # INIT
  init:
    - _type: grape
      name: getIfTramoActivo
  # GET
  # SET
  checkIfJornadaAbiertaSuccess:
    - _type: set
      path: jornadaAbierta
      value:
        payloadPath: response.tramo_activo
    - _type: grape
      name: checkPuntoVenta
  setPuntosVenta:
    - _type: set
      path: puntosVenta
      value:
        payloadPath: response.data
  setIdArqueo:
    - _type: set
      path: newPedido.idArqueo
      value:
        payloadPath: response
  setActualReadBarcode:
    - _type: set
      path: barcode
      value:
        payloadPath: value
  # POST
  getIfTramoActivo:
    - _type: post
      schema: tramos_jornada
      action: getIfTramoActivo
      data:
        - key: fechadesde
          value:
            payloadPath: hoy
      success: checkIfJornadaAbiertaSuccess
  getPuntosVenta:
    - _type: post
      schema: puntos_venta
      action: get_puntos_venta_tienda
      data:
        - key: codtienda
          value:
            statePath: newPedido.codTienda
      success: setPuntosVenta
  getIdArqueo:
    - _type: post
      schema: arqueo
      action: get_id_arqueo
      data:
        - key: codTienda
          value:
            statePath: newPedido.codTienda
        - key: codAgente
          value:
            statePath: newPedido.codAgente
        - key: codTpvPtoVenta
          value:
            statePath: puntoVentaSeleccionado
        - key: fecha
          value:
            statePath: newPedido.fecha
      success: setIdArqueo
  createNewLinea:
    - _type: post
      schema: articulo_barcode
      action: get_articulo_barcode
      data:
        - key: barcode
          value:
            statePath: barcode
        - key: fecha
          value:
            statePath: newPedido.fecha
        - key: codTarjetaPuntos
          value:
            statePath: newPedido.datosCliente.codTarjetaPuntos
        - key: codTienda
          value:
            statePath: newPedido.codTienda
        - key: idEmpresa
          value:
            statePath: newPedido.idEmpresa
      success: saveNewLineaPedido
  # PATCH
  # ALERTS
  onDeleteLineaSuccess:
    - _type: alert
      text: Se ha eliminado el producto correctamente
      severity: success
