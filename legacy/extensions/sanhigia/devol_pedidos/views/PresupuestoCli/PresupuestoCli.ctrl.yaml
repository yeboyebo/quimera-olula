---
shortcuts:
  - type: Model
    name: historico
    id: referencia
    schema: historicoPresupuestosCliente
    action: get_historico_pedidos
state:
  anadiendoDesdeHistorico: false
bunch:
  # En sanhigia cargamos siempre todas las líneas por la revisión
  # en la totalización que cambia precios y crea líneas regalo
  onLineasItemChanged:
    - _type: grape
      name: reloadPresupuesto
    - _type: grape
      name: getLineas
  onLineaCreada:
    - _type: grape
      name: reloadPresupuesto
    - _type: grape
      name: getLineas
  onPrintPresupuestoClicked:
    - _type: download
      schema: presupuestoCliToPDF
      params:
        - key: idpresupuesto
          value:
            statePath: presupuesto.buffer.idPresupuesto
      action: to_pdf
      filename:
        const: presupuesto.pdf
      success: none
  # onInitPresupuestoChanged:
  #   - _type: grape
  #     name: getHistoricoSiHayCliente
  onInitPresupuesto:
    patch: append
    grapes:
      - _type: grape
        name: getHistoricoSiHayCliente
  getHistoricoSiHayCliente:
    - condition:
        operator: A is true
        A:
          code: return !!state.presupuesto?.buffer.codCliente
      _type: grape
      name: getHistorico
  onAnadirLineaDesdeHistoricoClicked:
    - _type: set
      path: anadiendoDesdeHistorico
      value:
        const: true
    - _type: setItem
      condition:
        operator: A is true
        A:
          code: 'return !payload.referencia.includes(".")'
      path: historico.dict
      key:
        payloadPath: referencia
      prop:
        const: "_status"
      value:
        const: creating_line
    - _type: grape
      condition:
        operator: A is true
        A:
          code: 'return payload.referencia.includes(".")'
      name: seteaStatusCreatingLine
    - _type: patch
      action: build_linea
      schema: presupuestosCli
      success: onLineaHistoricoAnadida
      error: onLineaHistoricoAnadidaError
      id:
        statePath: presupuesto.buffer.idPresupuesto
      data:
        - key: referencia
          value:
            payloadPath: referencia
        - key: cantidad
          value:
            payloadPath: cantidad
  onLineaHistoricoAnadidaError:
    - _type: set
      path: anadiendoDesdeHistorico
      value:
        const: false
  onLineaHistoricoAnadida:
    - _type: set
      path: anadiendoDesdeHistorico
      value:
        const: false
    - _type: grape
      name: addLineasItem
      payload:
        id:
          payloadPath: response.pk
        event:
          const: created
    - _type: grape
      name: reloadPresupuesto
    - _type: grape
      name: deleteKeyHistorico
      payload:
        referencia:
          payloadPath: referencia
  onCalculaRecepcionesClicked:
    - _type: patch
      schema: checkStockLinea
      action: dame_recepciones_pendientes
      id:
        const: "-static-"
      data:
        - key: referencia
          value:
            payloadPath: referencia
      success: onRecepcionesRecibidas
  onRecepcionesRecibidas:
    - _type: setItem
      path: historico.dict
      key:
        payloadPath: referencia
      prop:
        const: recepciones
      value:
        payloadPath: response
  onPerderPresupuestoClicked:
    - _type: patch
      schema: presupuestosCli
      id:
        statePath: presupuesto.buffer.idPresupuesto
      data:
        - key: estadoPresupuesto
          value:
            const: "Perdido"
      success: onPresupuestoPerdido
      error: onPresupuestoPerdidoError
  onReactivarPresupuestoClicked:
    - _type: patch
      schema: presupuestosCli
      id:
        statePath: presupuesto.buffer.idPresupuesto
      data:
        - key: estadoPresupuesto
          value:
            const: "Pendiente"
      success: onPresupuestoReactivado
      error: onPresupuestoReactivadoError
  onPresupuestoPerdido:
    - _type: alert
      text: Presupuesto perdido
      severity: info
    - _type: grape
      name: reloadPresupuesto
  onPresupuestoReactivado:
    - _type: alert
      text: Presupuesto reactivado
      severity: info
    - _type: grape
      name: reloadPresupuesto
