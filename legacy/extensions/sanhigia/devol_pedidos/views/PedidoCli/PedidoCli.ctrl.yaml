---
shortcuts:
  - type: Model
    name: historico
    id: referencia
    schema: historicoPedidosCliente
    action: get_historico_pedidos
state:
  urlsTrackingData: {}
  modalTracking: false
  status:
    anadiendoDesdeHistorico: false
    enviandoPda: false
    viendoTracking: false
bunch:
  # En sanhigia cargamos siempre todas las líneas por la revisión
  # en la totalización que cambia precios y crea líneas regalo
  onLineasItemChanged:
    - _type: grape
      name: reloadPedido
    - _type: grape
      name: getLineas
  onLineaCreada:
    - _type: grape
      name: reloadPedido
    - _type: grape
      name: getLineas
  onEnviarPDAClicked:
    - _type: patch
      schema: pedidos
      action: enviar_pda
      id:
        statePath: pedido.buffer.idPedido
      success: onPedidoEnviadoPDA
      error: onEnviarPDAError
    - _type: set
      path: status.enviandoPda
      value:
        const: true
  onEnviarPDAError:
    - _type: set
      path: status.enviandoPda
      value:
        const: false
    - _type: alert
      text: Error al enviar el pedido
      severity: error
  onPedidoEnviadoPDA:
    - _type: set
      path: status.enviandoPda
      value:
        const: false
    - _type: grape
      name: reloadPedido
    - _type: alert
      text: Pedido enviado
      severity: success
  onAnadirLineaDesdeHistoricoClicked:
    - _type: set
      path: anadiendoDesdeHistorico
      value:
        const: true
    - _type: setItem
      condition:
        operator: A is true
        A:
          code: 'return !payload.referencia.includes(".")'
      path: historico.dict
      key:
        payloadPath: referencia
      prop:
        const: "_status"
      value:
        const: creating_line
    - _type: grape
      condition:
        operator: A is true
        A:
          code: 'return payload.referencia.includes(".")'
      name: seteaStatusCreatingLine
    - _type: patch
      action: build_linea
      schema: pedidos
      id:
        statePath: pedido.buffer.idPedido
      success: onLineaHistoricoAnadida
      error: onLineaHistoricoAnadidaError
      data:
        - key: referencia
          value:
            payloadPath: referencia
        - key: cantidad
          value:
            payloadPath: cantidad
  onLineaHistoricoAnadidaError:
    - _type: set
      path: anadiendoDesdeHistorico
      value:
        const: false
  onLineaHistoricoAnadida:
    - _type: set
      path: anadiendoDesdeHistorico
      value:
        const: false
    - _type: grape
      name: addLineasItem
      payload:
        id:
          payloadPath: response.pk
        event:
          const: created
    - _type: grape
      name: reloadPedido
    - _type: grape
      name: deleteKeyHistorico
      payload:
        referencia:
          payloadPath: referencia
  # onInitPedidoChanged:
  #   - _type: grape
  #     name: getHistoricoSiHayCliente
  onInitPedido:
    patch: append
    grapes:
      - _type: grape
        name: getHistoricoSiHayCliente
  getHistoricoSiHayCliente:
    - condition:
        operator: A is true
        A:
          code: return !!state.pedido?.buffer.codCliente
      _type: grape
      name: getHistorico
  onShVerTrackingClicked:
    - _type: get
      schema: pedidos
      action: sh_url_tracking
      id:
        statePath: pedido.data.idPedido
      success: onShTrackingRecibido
  onShTrackingRecibido:
    - _type: if
      if:
        operator: A is true
        A:
          code: "return payload.response.totalAlbaranes === 1"
      then:
        _type: grape
        name: comnprobarSiHayUrlTracking
      else:
        _type: grape
        name: seteaOpcionesTracking
  seteaOpcionesTracking:
    - _type: set
      path: urlsTrackingData
      value:
        payloadPath: response
    - _type: set
      path: modalTracking
      value:
        const: true
  comnprobarSiHayUrlTracking:
    - _type: if
      if:
        operator: A is defined
        A:
          code: "return payload.response.resultados[0].urlsegui"
      then:
        _type: grape
        name: onNavegarATrackingClicked
        payload:
          url:
            code: "return payload.response.resultados[0].urlsegui"
      else:
        _type: alert
        text: No hay enlace para el seguimiento
        severity: warning
  onNavegarATrackingClicked:
    - _type: navigate
      url:
        payloadPath: url
  onCerrarModalTracking:
    - _type: set
      path: modalTracking
      value:
        const: false
  onShLineaPromoClicked:
    - _type: patch
      schema: pedidos
      id:
        statePath: pedido.data.idPedido
      data:
        - key: idlinea
          value:
            statePath: lineas.current
      action: add_linea_promocion
      success: onLineaPromoAdded
  onLineaPromoAdded:
    - _type: grape
      name: onLineasItemChanged
  onCalculaRecepcionesClicked:
    - _type: patch
      schema: checkStockLinea
      action: dame_recepciones_pendientes
      id:
        const: "-static-"
      data:
        - key: referencia
          value:
            payloadPath: referencia
      success: onRecepcionesRecibidas
  onRecepcionesRecibidas:
    - _type: setItem
      path: historico.dict
      key:
        payloadPath: referencia
      prop:
        const: recepciones
      value:
        payloadPath: response
