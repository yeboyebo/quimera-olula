---
shortcuts:
  - type: DetailBuffer
    name: cliente
    id: codCliente
    action: "dame_clientes"
    schemaName: clientes
  - type: Model
    name: contactos
    action: "dame_contactos_cliente"
    id: codContacto
    schema: contactosCliente
  - type: Model
    name: tratosPendientes
    action: "get_tratos_pendiente_por_cliente"
    id: idTrato
    schema: tratosCliente
  - type: Model
    name: tareasPendientes
    action: "get_tareas_pendientes_por_cliente"
    id: idTarea
    schema: tareasCliente
  - type: Model
    name: presupuestosPendientes
    action: "get_presupuestos_pendientes_por_cliente"
    id: idPresupuesto
    schema: presupuestosCli
state:
  producto: null
  contactoAnadir: null
  modalAnadirContactoVisible: false
  modalCrearContactoVisible: false
  modalErroresCargaContactosExcel: false
  erroresCarga: []
bunch:
  # onInit:
  #   - _type: grape
  #     name: getCliente
  onSaveContactoClicked:
    - _type: patch
      schema: clientes
      action: add_contacto_cliente
      id:
        statePath: cliente.data.codCliente
      data:
        - key: codcontacto
          value:
            statePath: contactoAnadir
      success: onAddContactoEventoSuccess
      error: onAddContactoEventoError
  onAddContactoEventoSuccess:
    - _type: set
      path: contactoAnadir
      value:
        const: null
    - _type: set
      path: modalCrearContactoVisible
      value:
        const: false
    - _type: alert
      text: Contacto añadido con éxito
      severity: info
  onAddContactoEventoError:
    - _type: alert
      text: Error al añadir contacto.
      severity: error
  onAtrasClicked:
    - _type: grape
      name: cancelCliente
